<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>简单网页</title>
    <style>
        body {
            text-align: center;
            font-family: Arial, sans-serif;
        }

        h1 {
            font-size: 24px;
        }

        img {
            display: block;
            margin: 0 auto;
        }
    </style>
    <script>
        function showMessage() {
            alert("这是一个网页");
        }
    </script>
</head>
<body>
    <h1>这是一个网页</h1>
    <img src="230606-3.jpg" alt="图片">
    <button onclick="showMessage()">点击我</button>
</body>
</html>
